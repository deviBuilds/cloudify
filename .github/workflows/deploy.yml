name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/devibuilds/cloudify

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Set image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          target: prod
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Write environment file to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cat > /opt/cloudify/.env << 'ENVEOF'
          INFRA_AGENT_SECRET=${{ secrets.INFRA_AGENT_SECRET }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NPM_EMAIL=${{ secrets.NPM_EMAIL }}
          NPM_PASSWORD=${{ secrets.NPM_PASSWORD }}
          CLOUDIFY_DB_PASSWORD=${{ secrets.CLOUDIFY_DB_PASSWORD }}
          JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
          JWKS=${{ secrets.JWKS }}
          ENVEOF
          chmod 600 /opt/cloudify/.env"

      - name: Sync compose file and config
        run: |
          scp -i ~/.ssh/deploy_key \
            docker/docker-compose.cloudify.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/cloudify/app/docker/docker-compose.cloudify.yml
          scp -i ~/.ssh/deploy_key \
            cloudify.config.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/cloudify/app/cloudify.config.yml

      - name: Pull and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/cloudify/app/docker && \
             docker compose --env-file /opt/cloudify/.env -f docker-compose.cloudify.yml pull cloudify-web cloudify-api && \
             docker compose --env-file /opt/cloudify/.env -f docker-compose.cloudify.yml up -d cloudify-web cloudify-api"

      - name: Deploy Convex schema
        run: |
          cd apps/convex && npx convex deploy \
            --url https://convex.projectinworks.com \
            --admin-key '${{ secrets.CONVEX_ADMIN_KEY }}'

      - name: Health check
        run: |
          sleep 5
          curl -sf --max-time 10 https://projectinworks.com/ > /dev/null && echo "Health check passed" || echo "Health check failed (site may still be starting)"
