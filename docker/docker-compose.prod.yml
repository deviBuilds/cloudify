services:
  cloudify-postgres:
    image: postgres:16-alpine
    container_name: cloudify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudify
      POSTGRES_PASSWORD: ${CLOUDIFY_DB_PASSWORD}
      POSTGRES_DB: cloudify
    volumes:
      - cloudify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudify -d cloudify"]
      interval: 5s
      timeout: 3s
      retries: 10

  cloudify-convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: cloudify-convex
    restart: unless-stopped
    environment:
      - POSTGRES_URL=postgresql://cloudify:${CLOUDIFY_DB_PASSWORD}@cloudify-postgres:5432/cloudify
      - CONVEX_CLOUD_ORIGIN=${CLOUDIFY_CONVEX_URL}
      - CONVEX_SITE_ORIGIN=${CLOUDIFY_CONVEX_SITE}
      - DO_NOT_REQUIRE_SSL=true
    depends_on:
      cloudify-postgres:
        condition: service_healthy
    volumes:
      - cloudify_convex_data:/convex/data
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  web:
    image: ${REGISTRY:-ghcr.io/user}/cloudify-web:${TAG:-latest}
    container_name: cloudify-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_CONVEX_URL=${CLOUDIFY_CONVEX_URL}
      - INFRA_AGENT_URL=http://api:4000
    depends_on:
      cloudify-convex:
        condition: service_healthy

  api:
    image: ${REGISTRY:-ghcr.io/user}/cloudify-api:${TAG:-latest}
    container_name: cloudify-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - INFRA_AGENT_SECRET=${INFRA_AGENT_SECRET}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - NPM_URL=${NPM_URL}
      - NPM_EMAIL=${NPM_EMAIL}
      - NPM_PASSWORD=${NPM_PASSWORD}
      - SERVER_IP=${SERVER_IP}
      - BASE_DOMAIN=${BASE_DOMAIN}
    depends_on:
      cloudify-convex:
        condition: service_healthy

volumes:
  cloudify_pgdata:
  cloudify_convex_data:
